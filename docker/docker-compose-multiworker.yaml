services:
  multiworker_server:
    build:
      context: ../serving/multiworker
      dockerfile: Dockerfile
    container_name: jellyfin_multiworker_server
    ports:
      - "8002:8000"
    environment:
      SERVING_MODE: ${SERVING_MODE:-model}
      FALLBACK_POOL_SIZE: ${FALLBACK_POOL_SIZE:-100}
      FALLBACK_IDS_FILE: /app/app/fallback_popular_movies.json
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: jellyfin_multiworker_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/multiworker-prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - multiworker_server
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: jellyfin_multiworker_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
