services:

  onnx_1:
    build:
      context: ../../serving/onnx        # reuses the existing ONNX image
      dockerfile: ../../serving/onnx/Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  onnx_2:
    build:
      context: ../../serving/onnx
      dockerfile: ../../serving/onnx/Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8005:80"             # host:8004 → nginx:80 → onnx_1/onnx_2:8000
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      onnx_1:
        condition: service_healthy
      onnx_2:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3