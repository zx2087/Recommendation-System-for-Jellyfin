upstream onnx_backend {
    # Round-robin load balancing across two ONNX service instances
    server onnx_1:8000;
    server onnx_2:8000;
    keepalive 32;          # keep persistent connections to upstream
}

server {
    listen 80;
    client_max_body_size 50M;
    # Forward /health to upstream so Docker HEALTHCHECK still works
    location /health {
        proxy_pass         http://onnx_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    location /recommend {
        proxy_pass         http://onnx_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }
}